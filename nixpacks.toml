providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]
aptPkgs = ["fontconfig", "libfreetype6", "libssl-dev", "bzip2"]

[phases.install]
cmds = ["npm install", "PHANTOMJS_CDNURL=https://npmmirror.com/mirrors/phantomjs node node_modules/phantomjs-prebuilt/install.js || true"]

[start]
cmd = "npm start"

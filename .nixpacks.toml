providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "fontconfig", "freetype", "zlib"]
nixLibs = ["fontconfig", "freetype", "zlib"]
aptPkgs = ["fontconfig", "libfreetype6", "libssl-dev", "bzip2"]

[phases.install]
cmds = ["npm install", "node node_modules/phantomjs-prebuilt/install.js"]

[start]
cmd = "npm start"
